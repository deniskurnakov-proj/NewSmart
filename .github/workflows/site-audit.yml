name: Hotel website audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/site_audit.js'
      - 'tools/run_site_audit.js'
      - 'data/site_input.part*'
      - 'package.json'

permissions:
  contents: read

jobs:
  audit:
    if: github.event.pull_request.head.ref == 'site-audit-run-20260713'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Audit hotel websites
        id: audit
        continue-on-error: true
        run: |
          mkdir -p data
          node tools/run_site_audit.js > data/site_audit.log 2>&1
      - name: Upload audit results and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hotel-site-audit
          path: |
            data/site_audit_results.csv
            data/site_audit_results.json
            data/site_audit.log
          if-no-files-found: warn
          retention-days: 7
