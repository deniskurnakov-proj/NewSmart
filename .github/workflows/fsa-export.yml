name: FSA hotel registry export

on:
  push:
    branches: [main]
    paths:
      - 'tools/fsa_export.py'
      - '.github/workflows/fsa-export.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch registry data
        run: python tools/fsa_export.py

      - name: Commit exported data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update FSA hotel registry export"
            git push
          fi
