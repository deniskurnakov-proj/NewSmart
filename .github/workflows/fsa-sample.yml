name: FSA endpoint sample

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/fsa_sample.py
      - uses: actions/upload-artifact@v4
        with:
          name: fsa-endpoint-sample
          path: sample/
          retention-days: 1
