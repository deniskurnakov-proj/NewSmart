name: FSA hotels enrich

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch registry and hotel contacts
        run: python tools/fsa_enrich.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fsa-hotels-enriched
          path: data/
          retention-days: 3
