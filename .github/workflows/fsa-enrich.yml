name: FSA hotel contacts export

on:
  push:
    branches: [main]
    paths:
      - 'tools/fsa_enrich.py'
      - '.github/workflows/fsa-enrich.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch registry details
        run: python tools/fsa_enrich.py
      - name: Commit export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update Moscow Oblast hotel contacts" || exit 0
          git push
